
name: CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 610269527458.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: taskmaster
  ECS_CLUSTER: taskmaster-dev-cluster
  ECS_SERVICE: taskmaster-dev-service
  CONTAINER_NAME: taskmaster-app
  TASK_DEFINITION_FAMILY: taskmaster-dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run tests
        run: ./mvnw test

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  build-prometheus:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repo for prometheus if not exists
        run: |
          aws ecr describe-repositories --repository-names taskmaster-prometheus \
            --region ap-south-1 2>/dev/null || \
          aws ecr create-repository --repository-name taskmaster-prometheus \
            --region ap-south-1

      - name: Build and push prometheus image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/taskmaster-prometheus:latest
          docker build -t $IMAGE_URI ./prometheus/
          docker push $IMAGE_URI

  build-and-push-ecr:
    needs: [build-and-test, build-prometheus]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - id: build-image
        name: Build, tag, and push image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  deploy-to-ecs:
    needs: build-and-push-ecr
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push-ecr.outputs.image }}

      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  smoke-test:
    needs: deploy-to-ecs
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ALB DNS name and hit health endpoint
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names taskmaster-alb \
            --query "LoadBalancers[0].DNSName" \
            --output text \
            --region ap-south-1)
          echo "Testing: https://$ALB_DNS/actuator/health"
          curl --fail --retry 5 --retry-delay 15 -k \
            "https://$ALB_DNS/actuator/health"
